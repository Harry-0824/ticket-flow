services:
  - type: web
    name: ticket-flow-api
    runtime: dotnet
    plan: free
    rootDir: backend
    buildCommand: dotnet publish TicketFlow.Api.csproj -c Release -o out
    startCommand: dotnet out/TicketFlow.Api.dll
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__Provider
        value: PostgreSQL
      - key: ConnectionStrings__TicketFlowPostgres
        sync: false
      - key: Jwt__Issuer
        value: TicketFlow
      - key: Jwt__Audience
        value: TicketFlowClient
      - key: Jwt__Secret
        sync: false
      - key: Jwt__ExpiresMinutes
        value: 60
      - key: Cors__AllowedOrigins
        value: https://your-netlify-site.netlify.app
