name: Branch Checks (Canon v4.0)

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  branch-freshness-check:
    name: branch-freshness-check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch develop
        run: git fetch origin develop

      - name: Check branch freshness
        run: |
          set -euo pipefail

          if git merge-base --is-ancestor origin/develop HEAD; then
            echo "PASS: PR HEAD includes latest origin/develop."
          else
            echo "FAIL: PR branch is behind origin/develop."
            exit 1
          fi

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## Branch Freshness Check Failed',
                '',
                '`develop` has been updated since this branch was created.',
                '',
                '**[Canon v4.0]** 請先將最新 `develop` 合併或 rebase 到目前分支，再重新執行驗證。',
                '',
                '```bash',
                'git fetch origin develop',
                'git rebase origin/develop',
                '# or: git merge origin/develop',
                'dotnet test',
                'cd frontend && npm ci',
                'cd frontend && npm run lint',
                'cd frontend && npm run test',
                'cd frontend && npm run build',
                'git push --force-with-lease',
                '```',
                '',
                '> 修 freshness 時不得擴大 Issue scope。'
              ].join('\n')
            });

  review-budget-guard:
    name: review-budget-guard
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch develop
        run: git fetch origin develop

      - name: Check review budget
        run: |
          set -euo pipefail

          BASE="origin/develop"
          RANGE="$BASE...HEAD"

          changed_files="$(git diff --name-only "$RANGE" | wc -l | tr -d ' ')"
          total_lines="$(git diff --numstat "$RANGE" | awk '{add+=$1; del+=$2} END {print add+del+0}')"
          max_file_lines="$(git diff --numstat "$RANGE" | awk '{sum=$1+$2; if(sum>max) max=sum} END {print max+0}')"
          pr_body="$(python3 -c "import json; print(json.load(open('$GITHUB_EVENT_PATH'))['pull_request'].get('body') or '')")"

          echo "--- Canon v4.0 Review Budget Stats ---"
          echo "Changed files: $changed_files (limit: 10)"
          echo "Total diff lines: $total_lines (limit: 800)"
          echo "Largest file diff: $max_file_lines (limit: 300)"

          fail="false"
          if [ "$changed_files" -gt 10 ]; then
            echo "FAIL: Changed files exceeds review budget."
            fail="true"
          fi

          if [ "$total_lines" -gt 800 ]; then
            echo "FAIL: Total diff lines exceeds review budget."
            fail="true"
          fi

          if [ "$max_file_lines" -gt 300 ]; then
            echo "FAIL: Single file diff exceeds review budget."
            fail="true"
          fi

          if [ "$fail" = "true" ]; then
            if printf "%s" "$pr_body" | grep -qi "review-budget/approved-exception"; then
              echo "PASS: Review budget exception approved in PR body."
              exit 0
            fi

            exit 1
          fi

          echo "PASS: PR is within Canon v4.0 review budget."

      - name: Add label and comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['status/needs-split-issue']
              });
            } catch (error) {
              console.log('Label add failed:', error.message);
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## Review Budget Guard Failed',
                '',
                'PR 超過 Canon v4.0 review budget，請拆小 Issue 或由 User 明確核准例外。',
                '',
                '| Metric | Limit |',
                '| --- | --- |',
                '| Changed files | <= 10 |',
                '| Total diff lines | <= 800 |',
                '| Single file diff | <= 300 |',
                '',
                '若此 PR 必須維持目前 scope，請在 PR body 加上：',
                '',
                '```',
                'review-budget/approved-exception: <reason>',
                '```',
                '',
                '> 核准例外不代表可自動合併，仍需通過其他 required checks。'
              ].join('\n')
            });

  supply-chain-guard:
    name: supply-chain-guard
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch develop
        run: git fetch origin develop

      - name: Check supply-chain sensitive files
        run: |
          set -euo pipefail

          BASE="origin/develop"
          RANGE="$BASE...HEAD"
          sensitive_files="$(git diff --name-only "$RANGE" | grep -E '(^|/)(package\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|Dockerfile|docker-compose\.yml|\.github/workflows/)' || true)"

          if [ -z "$sensitive_files" ]; then
            echo "PASS: No supply-chain sensitive files changed."
            exit 0
          fi

          echo "WARN: Supply-chain sensitive files changed:"
          echo "$sensitive_files"

          pr_body="$(python3 -c "import json; print(json.load(open('$GITHUB_EVENT_PATH'))['pull_request'].get('body') or '')")"
          if printf "%s" "$pr_body" | grep -Eqi "(supply-chain-approved|dependency-approved):"; then
            echo "PASS: Supply-chain change explicitly approved in PR body."
            exit 0
          fi

          echo "FAIL: Supply-chain sensitive files require explicit Issue-scoped approval."
          exit 1

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## Supply Chain Guard Needs Review',
                '',
                '此 PR 修改了 supply-chain sensitive files，例如 package/lockfile、Dockerfile 或 GitHub Actions workflow。',
                '',
                '**[Canon v4.0]** 這類變更必須在 Issue scope 內，且由 User 明確核准。',
                '',
                '若此變更是刻意且符合 Issue scope，請在 PR body 加上：',
                '',
                '```',
                'supply-chain-approved: <reason>',
                '```',
                '',
                '舊格式 `dependency-approved: <reason>` 暫時保留相容，但新 PR 建議使用 `supply-chain-approved`。',
                '',
                '> 若不是 Issue scope 內的必要變更，請移除相關 diff。'
              ].join('\n')
            });

  hotfix-sync-lock:
    name: hotfix-sync-lock
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main and develop
        run: git fetch origin main develop

      - name: Check hotfix sync lock
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          if [ "$HEAD_REF" = "infrastructure/sync-main-to-develop" ]; then
            echo "PASS: sync-main-to-develop PR is allowed to clear the hotfix sync lock."
            exit 0
          fi

          if git merge-base --is-ancestor origin/main origin/develop; then
            echo "PASS: main is fully synced into develop."
            exit 0
          fi

          echo "FAIL: main has commits not yet synced back into develop."
          exit 1

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## Hotfix Sync Lock Active',
                '',
                '`main` has commits that have not been synced back into `develop`.',
                '',
                '**[Canon v4.0]** 在 `main` 完整同步回 `develop` 前，Issue PR 不應繼續合併。',
                '',
                '**Resolution:**',
                '1. 建立或更新 `infrastructure/sync-main-to-develop` PR。',
                '2. 等 sync PR 通過 Canon v4.0 checks。',
                '3. 合併 sync PR，清除 lock。',
                '4. 重新觸發目前 PR checks。',
                '',
                '```bash',
                'git fetch origin main develop',
                'git checkout -B infrastructure/sync-main-to-develop origin/main',
                'git push -u origin infrastructure/sync-main-to-develop',
                '```'
              ].join('\n')
            });
