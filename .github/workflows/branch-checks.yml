name: Branch Checks (Canon v4.0)

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  branch-freshness-check:
    name: branch-freshness-check
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch develop
        run: git fetch origin develop

      - name: Check branch freshness
        run: |
          set -euo pipefail

          if git merge-base --is-ancestor origin/develop HEAD; then
            echo "PASS: PR HEAD includes latest origin/develop."
          else
            echo "FAIL: PR branch is behind origin/develop."
            exit 1
          fi

      - name: Write failure summary
        if: failure()
        run: |
          {
            echo "## Branch Freshness Check Failed"
            echo
            echo "The PR branch is behind \`develop\`."
            echo
            echo "### Suggested resolution"
            echo
            echo "\`\`\`bash"
            echo "git fetch origin develop"
            echo "git rebase origin/develop"
            echo "# or: git merge origin/develop"
            echo "dotnet test"
            echo "cd frontend && npm ci"
            echo "cd frontend && npm run lint"
            echo "cd frontend && npm run test"
            echo "cd frontend && npm run build"
            echo "git push --force-with-lease"
            echo "\`\`\`"
            echo
            echo "> Keep freshness fixes limited to the assigned Issue scope."
          } >> "$GITHUB_STEP_SUMMARY"

  review-budget-guard:
    name: review-budget-guard
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch develop
        run: git fetch origin develop

      - name: Check review budget
        run: |
          set -euo pipefail

          BASE="origin/develop"
          RANGE="$BASE...HEAD"

          changed_files="$(git diff --name-only "$RANGE" | wc -l | tr -d ' ')"
          total_lines="$(git diff --numstat "$RANGE" | awk '{add+=$1; del+=$2} END {print add+del+0}')"
          max_file_lines="$(git diff --numstat "$RANGE" | awk '{sum=$1+$2; if(sum>max) max=sum} END {print max+0}')"
          pr_body="$(python3 -c "import json; print(json.load(open('$GITHUB_EVENT_PATH'))['pull_request'].get('body') or '')")"

          echo "--- Canon v4.0 Review Budget Stats ---"
          echo "Changed files: $changed_files (limit: 10)"
          echo "Total diff lines: $total_lines (limit: 800)"
          echo "Largest file diff: $max_file_lines (limit: 300)"

          fail="false"
          if [ "$changed_files" -gt 10 ]; then
            echo "FAIL: Changed files exceeds review budget."
            fail="true"
          fi

          if [ "$total_lines" -gt 800 ]; then
            echo "FAIL: Total diff lines exceeds review budget."
            fail="true"
          fi

          if [ "$max_file_lines" -gt 300 ]; then
            echo "FAIL: Single file diff exceeds review budget."
            fail="true"
          fi

          if [ "$fail" = "true" ]; then
            if printf "%s" "$pr_body" | grep -qi "review-budget/approved-exception"; then
              echo "PASS: Review budget exception approved in PR body."
              exit 0
            fi

            exit 1
          fi

          echo "PASS: PR is within Canon v4.0 review budget."

      - name: Write failure summary
        if: failure()
        run: |
          {
            echo "## Review Budget Guard Failed"
            echo
            echo "This PR exceeds the Canon v4.0 review budget and should be split unless an exception was explicitly approved."
            echo
            echo "| Metric | Limit |"
            echo "| --- | --- |"
            echo "| Changed files | <= 10 |"
            echo "| Total diff lines | <= 800 |"
            echo "| Single file diff | <= 300 |"
            echo
            echo "Approved exception token:"
            echo
            echo "\`\`\`text"
            echo "review-budget/approved-exception: <reason>"
            echo "\`\`\`"
            echo
            echo "> Do not use this token unless the user approved the exception for this PR."
          } >> "$GITHUB_STEP_SUMMARY"

  supply-chain-guard:
    name: supply-chain-guard
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
    steps:
      - name: Checkout PR HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch develop
        run: git fetch origin develop

      - name: Check supply-chain sensitive files
        run: |
          set -euo pipefail

          BASE="origin/develop"
          RANGE="$BASE...HEAD"
          sensitive_files="$(git diff --name-only "$RANGE" | grep -E '(^|/)(package\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|Dockerfile|docker-compose\.ya?ml|\.github/workflows/)' || true)"

          if [ -z "$sensitive_files" ]; then
            echo "PASS: No supply-chain sensitive files changed."
            exit 0
          fi

          echo "WARN: Supply-chain sensitive files changed:"
          echo "$sensitive_files"

          pr_body="$(python3 -c "import json; print(json.load(open('$GITHUB_EVENT_PATH'))['pull_request'].get('body') or '')")"
          if printf "%s" "$pr_body" | grep -Eqi "(supply-chain-approved|dependency-approved):"; then
            echo "PASS: Supply-chain change explicitly approved in PR body."
            exit 0
          fi

          echo "FAIL: Supply-chain sensitive files require explicit Issue-scoped approval."
          exit 1

      - name: Write failure summary
        if: failure()
        run: |
          {
            echo "## Supply Chain Guard Needs Review"
            echo
            echo "This PR changes supply-chain sensitive files, such as package files, lockfiles, Docker files, or GitHub Actions workflows."
            echo
            echo "If this change is explicitly in scope, add the approved token to the PR body:"
            echo
            echo "\`\`\`text"
            echo "supply-chain-approved: <reason>"
            echo "\`\`\`"
            echo
            echo "For dependency-only changes, use:"
            echo
            echo "\`\`\`text"
            echo "dependency-approved: <reason>"
            echo "\`\`\`"
            echo
            echo "> Keep supply-chain changes limited to the assigned Issue scope."
          } >> "$GITHUB_STEP_SUMMARY"
