name: GPT Review Gate (Canon v4.0)

on:
  pull_request:
    branches:
      - develop
      - main
    types: [opened, synchronize, reopened, ready_for_review]

# 同一個 PR 的新 commit 會排隊重跑；不取消進行中的 run，避免 status context 被中途取消。
concurrency:
  group: gpt-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  gpt-review:
    name: gpt-review-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect Canon v4.0 context
        id: context
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          git fetch origin main develop "$BASE_REF" --prune

          MODE="unsupported"
          FLOW_VALID="false"
          FLOW_REASON="Unsupported PR base branch."
          DIFF_BASE="origin/$BASE_REF"

          if [ "$BASE_REF" = "main" ]; then
            MODE="release"
            if [ "$HEAD_REF" = "develop" ]; then
              FLOW_VALID="true"
              FLOW_REASON="develop to main release PR."
            else
              FLOW_REASON="main PR must come from develop."
            fi
          elif [ "$BASE_REF" = "develop" ]; then
            MODE="development"
            FLOW_VALID="true"
            FLOW_REASON="issue branch to develop PR."
          fi

          CHANGED_FILES="$(git diff --name-only "$DIFF_BASE"...HEAD || true)"
          DIFF_STAT="$(git diff --stat "$DIFF_BASE"...HEAD || true)"
          TOTAL_LINES="$(git diff --numstat "$DIFF_BASE"...HEAD | awk '{add+=$1; del+=$2} END {print add+del+0}')"
          CHANGED_COUNT="$(printf "%s\n" "$CHANGED_FILES" | sed '/^$/d' | wc -l | tr -d ' ')"

          RISK="low"
          if printf "%s\n%s\n%s" "$PR_TITLE" "$PR_BODY" "$CHANGED_FILES" | grep -qiE '(database|auth|migration|deploy|ci|workflow|docker|render|netlify|supabase|security|secret|permission)'; then
            RISK="high"
          elif printf "%s\n%s\n%s" "$PR_TITLE" "$PR_BODY" "$CHANGED_FILES" | grep -qiE '(api|service|state|router|store|validation)'; then
            RISK="medium"
          fi

          BRANCH_FRESHNESS="unknown"
          if [ "$MODE" = "development" ]; then
            if git merge-base --is-ancestor origin/develop HEAD; then
              BRANCH_FRESHNESS="pass"
            else
              BRANCH_FRESHNESS="fail"
            fi
          fi

          HOTFIX_SYNC_LOCK_ACTIVE="false"
          if ! git merge-base --is-ancestor origin/main origin/develop; then
            HOTFIX_SYNC_LOCK_ACTIVE="true"
          fi

          SENSITIVE_FILES="$(printf "%s\n" "$CHANGED_FILES" | grep -E '(^|/)(package\.json|package-lock\.json|pnpm-lock\.yaml|yarn\.lock|Dockerfile|docker-compose\.ya?ml|\.github/workflows/)' || true)"

          {
            echo "mode=$MODE"
            echo "flow_valid=$FLOW_VALID"
            echo "flow_reason=$FLOW_REASON"
            echo "risk=$RISK"
            echo "total_lines=$TOTAL_LINES"
            echo "changed_count=$CHANGED_COUNT"
            echo "branch_freshness=$BRANCH_FRESHNESS"
            echo "hotfix_sync_lock_active=$HOTFIX_SYNC_LOCK_ACTIVE"
            echo "changed_files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
            echo "sensitive_files<<EOF"
            echo "$SENSITIVE_FILES"
            echo "EOF"
            echo "diff_stat<<EOF"
            echo "$DIFF_STAT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Fail unsupported PR flow
        if: steps.context.outputs.flow_valid != 'true'
        uses: actions/github-script@v7
        env:
          FLOW_REASON: ${{ steps.context.outputs.flow_reason }}
        with:
          script: |
            const reason = process.env.FLOW_REASON || 'Unsupported PR flow.';
            const sha = context.payload.pull_request.head.sha;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'failure',
              context: 'gpt-review-gate',
              description: reason.slice(0, 140)
            });

            core.setFailed(reason);

      - name: Approve release PR gate
        if: steps.context.outputs.mode == 'release' && steps.context.outputs.flow_valid == 'true'
        uses: actions/github-script@v7
        env:
          TOTAL_LINES: ${{ steps.context.outputs.total_lines }}
          CHANGED_COUNT: ${{ steps.context.outputs.changed_count }}
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const totalLines = process.env.TOTAL_LINES || '0';
            const changedCount = process.env.CHANGED_COUNT || '0';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'success',
              context: 'gpt-review-gate',
              description: 'Canon v4.0 release gate passed: develop -> main.'
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ✅ GPT Review Gate Passed — Canon v4.0 Release',
                '',
                '此 PR 是 `develop → main` release flow。',
                '',
                `- Changed files: ${changedCount}`,
                `- Total diff lines: ${totalLines}`,
                '- `gpt-review-gate` 已產生 required success context。',
                '- Release merge 仍由 User 人工決定；CI 與 GitGuardian 仍需通過。'
              ].join('\n')
            });

      - name: Check OPENROUTER_API_KEY
        if: steps.context.outputs.mode == 'development'
        id: check_key
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "key_missing=true" >> "$GITHUB_OUTPUT"
          else
            echo "key_missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Manual fallback when GPT key is missing
        if: steps.context.outputs.mode == 'development' && steps.check_key.outputs.key_missing == 'true'
        uses: actions/github-script@v7
        env:
          RISK: ${{ steps.context.outputs.risk }}
          BRANCH_FRESHNESS: ${{ steps.context.outputs.branch_freshness }}
          HOTFIX_SYNC_LOCK_ACTIVE: ${{ steps.context.outputs.hotfix_sync_lock_active }}
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const risk = process.env.RISK || 'unknown';
            const branchFreshness = process.env.BRANCH_FRESHNESS || 'unknown';
            const hotfixSyncLock = process.env.HOTFIX_SYNC_LOCK_ACTIVE || 'unknown';

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'success',
              context: 'gpt-review-gate',
              description: `Canon v4.0 manual fallback. Risk: ${risk}.`
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ⚠️ GPT Review Gate — Manual Fallback',
                '',
                '`OPENROUTER_API_KEY` 未設定，因此 Canon v4.0 進入 manual fallback。',
                '',
                `- Risk hint: ${risk}`,
                `- Branch freshness: ${branchFreshness}`,
                `- Hotfix sync lock active: ${hotfixSyncLock}`,
                '',
                '`gpt-review-gate` 會產生 success context，避免基礎設施缺失阻擋 PR；實際 review 需由 User / reviewer 人工確認。',
                '',
                '> 其他 deterministic checks（CI、branch-freshness、review-budget、supply-chain、hotfix-sync-lock）仍需各自通過。'
              ].join('\n')
            });

      - name: GPT JSON gate
        if: steps.context.outputs.mode == 'development' && steps.check_key.outputs.key_missing == 'false'
        id: gpt_json_gate
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          RISK: ${{ steps.context.outputs.risk }}
          TOTAL_LINES: ${{ steps.context.outputs.total_lines }}
          CHANGED_COUNT: ${{ steps.context.outputs.changed_count }}
          BRANCH_FRESHNESS: ${{ steps.context.outputs.branch_freshness }}
          HOTFIX_SYNC_LOCK_ACTIVE: ${{ steps.context.outputs.hotfix_sync_lock_active }}
          CHANGED_FILES: ${{ steps.context.outputs.changed_files }}
          SENSITIVE_FILES: ${{ steps.context.outputs.sensitive_files }}
          DIFF_STAT: ${{ steps.context.outputs.diff_stat }}
        run: |
          set -euo pipefail

          python3 <<'PY' > /tmp/gpt_request.json
          import json
          import os

          prompt = f"""
          你是 PR Merge Gate Review 系統（Canon v4.0）。

          請只根據 PR metadata、changed files 與 diff stat 做 gate 判斷。
          若資訊不足以判斷，請輸出 unknown，不要猜測。

          Repo: {os.environ['REPOSITORY']}
          PR: #{os.environ['PR_NUMBER']}
          Title: {os.environ['PR_TITLE']}
          Body:
          {os.environ.get('PR_BODY', '')}

          Risk hint: {os.environ['RISK']}
          Changed file count: {os.environ['CHANGED_COUNT']}
          Total diff lines: {os.environ['TOTAL_LINES']}
          Branch freshness: {os.environ['BRANCH_FRESHNESS']}
          Hotfix sync lock active: {os.environ['HOTFIX_SYNC_LOCK_ACTIVE']}

          Changed files:
          {os.environ.get('CHANGED_FILES', '')}

          Supply-chain sensitive files:
          {os.environ.get('SENSITIVE_FILES', '')}

          Diff stat:
          {os.environ.get('DIFF_STAT', '')}

          必須只輸出 JSON，不要 markdown，不要 code fence。
          JSON schema:
          {{
            "schema_version": "gpt-review-gate-v4",
            "verdict": "approve | request_changes | reject | infra_error",
            "risk": "low | medium | high",
            "issue_alignment": "pass | fail | unknown",
            "scope_creep": "pass | fail | unknown",
            "unrelated_files": "pass | fail | unknown",
            "dependency_policy": "pass | fail | needs_user_approval | unknown",
            "security": "pass | fail | unknown",
            "testing": "pass | fail | unknown",
            "branch_freshness": "pass | fail | unknown",
            "hotfix_sync_lock_active": true,
            "blocking_reasons": ["max 5 items, each max 120 chars"],
            "required_actions": ["max 5 items, each max 120 chars"]
          }}
          """

          request = {
              "model": "openai/gpt-4o-mini",
              "max_tokens": 700,
              "temperature": 0,
              "response_format": {"type": "json_object"},
              "messages": [
                  {
                      "role": "system",
                      "content": "你是 PR Merge Gate 審核器。只能輸出符合 schema_version=gpt-review-gate-v4 的 JSON。"
                  },
                  {"role": "user", "content": prompt}
              ],
          }
          print(json.dumps(request))
          PY

          if ! curl -fsS https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "HTTP-Referer: https://github.com/${REPOSITORY}" \
            -H "X-Title: TicketFlow GPT Review Gate" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/gpt_request.json \
            > /tmp/gpt_response.json; then
            echo '{"schema_version":"gpt-review-gate-v4","verdict":"infra_error","risk":"high","blocking_reasons":["OpenRouter API call failed"],"required_actions":["Check OPENROUTER_API_KEY and provider availability"]}' > /tmp/gpt_gate.json
          else
            python3 <<'PY' > /tmp/gpt_gate.json
          import json

          try:
              with open("/tmp/gpt_response.json", encoding="utf-8") as handle:
                  data = json.load(handle)
              content = data["choices"][0]["message"]["content"].strip()
              if content.startswith("```"):
                  content = "\n".join(content.splitlines()[1:])
              if content.endswith("```"):
                  content = "\n".join(content.splitlines()[:-1])
              parsed = json.loads(content)
          except Exception as exc:
              parsed = {
                  "schema_version": "gpt-review-gate-v4",
                  "verdict": "infra_error",
                  "risk": "high",
                  "blocking_reasons": [f"GPT response parse failed: {str(exc)[:80]}"],
                  "required_actions": ["Inspect gpt-review-gate workflow logs"],
              }

          print(json.dumps(parsed, ensure_ascii=False))
          PY
          fi

          cat /tmp/gpt_gate.json

          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json

          with open("/tmp/gpt_gate.json", encoding="utf-8") as handle:
              gate = json.load(handle)

          print(f"verdict={gate.get('verdict', 'infra_error')}")
          print(f"risk={gate.get('risk', 'unknown')}")
          print("blocking_reasons=" + " | ".join(gate.get("blocking_reasons", [])[:5]))
          print("required_actions=" + " | ".join(gate.get("required_actions", [])[:5]))
          PY

      - name: Publish GPT gate result
        if: steps.context.outputs.mode == 'development' && steps.check_key.outputs.key_missing == 'false'
        uses: actions/github-script@v7
        env:
          VERDICT: ${{ steps.gpt_json_gate.outputs.verdict }}
          RISK: ${{ steps.gpt_json_gate.outputs.risk }}
          BLOCKING_REASONS: ${{ steps.gpt_json_gate.outputs.blocking_reasons }}
          REQUIRED_ACTIONS: ${{ steps.gpt_json_gate.outputs.required_actions }}
        with:
          script: |
            const verdict = process.env.VERDICT || 'infra_error';
            const risk = process.env.RISK || 'unknown';
            const blocking = process.env.BLOCKING_REASONS || '';
            const required = process.env.REQUIRED_ACTIONS || '';
            const sha = context.payload.pull_request.head.sha;

            const approved = verdict === 'approve';
            const description = approved
              ? `Canon v4.0 GPT gate approved. Risk: ${risk}.`
              : `Canon v4.0 GPT gate ${verdict}.`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: approved ? 'success' : 'failure',
              context: 'gpt-review-gate',
              description: description.slice(0, 140)
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                approved ? '## ✅ GPT Review Gate Passed — Canon v4.0' : '## ❌ GPT Review Gate Failed — Canon v4.0',
                '',
                `- Verdict: ${verdict}`,
                `- Risk: ${risk}`,
                blocking ? `- Blocking reasons: ${blocking}` : '- Blocking reasons: none',
                required ? `- Required actions: ${required}` : '- Required actions: none'
              ].join('\n')
            });

            if (!approved) {
              core.setFailed(description);
            }
